<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesta-Word</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f4f9; color: #333; touch-action: manipulation; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .home-btn { width: auto; padding: 8px 15px; font-size: 14px; background: #6c757d; margin: 0; text-decoration: none; color: white; border-radius: 6px; display: inline-block; font-weight: bold; }
        h1 { margin: 0; flex-grow: 1; text-align: center; font-size: 24px; }
        
        .pause-btn { background: #6c757d; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 18px; min-width: 45px; transition: background-color 0.2s; }
        .pause-btn:disabled { opacity: 0.3; cursor: not-allowed; background: #6c757d !important; }
        
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        label { font-weight: bold; font-size: 14px; color: #555; display: block; text-align: left; margin-top: 10px; }
        
        .settings-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 20px; }
        
        .btn-primary { background-color: #007bff; border: none; color: white; padding: 15px 32px; text-align: center; display: inline-block; font-size: 16px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; }
        .btn-success { background-color: #28a745; border: none; color: white; padding: 15px; font-size: 16px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; margin-top: 15px; }
        .btn-submit { background-color: #007bff; color: white; border: none; padding: 18px; font-size: 20px; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-submit:disabled { background-color: #6c757d; cursor: not-allowed; opacity: 0.5; }
        
        .bottom-actions { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
        .btn-leave { background: transparent; color: #6c757d; border: 1px solid #6c757d; padding: 10px 15px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; flex: 1; }
        .btn-end { background: transparent; color: #dc3545; border: 1px solid #dc3545; padding: 10px 15px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; flex: 1; }
        
        #lobby-screen, #game-screen { display: none; }
        
        .player-list { list-style: none; padding: 0; margin: 15px 0; background: #f8f9fa; border-radius: 8px; }
        .player-list li { padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        .player-list li:last-child { border-bottom: none; }
        .win-badge { background: #ffc107; color: #856404; padding: 2px 8px; border-radius: 12px; font-size: 14px; }

        .turn-banner { padding: 10px; font-size: 18px; font-weight: bold; border-radius: 8px; margin-bottom: 10px; transition: background-color 0.3s; }
        .turn-active { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .turn-waiting { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        
        .timer-display { font-size: 32px; font-weight: bold; color: #dc3545; margin: 10px 0; }
        
        .word-input-display { font-size: 36px; letter-spacing: 10px; font-weight: bold; min-height: 50px; margin: 10px 0 0 0; color: #007bff; text-transform: uppercase; }
        .error-message { color: #dc3545; font-weight: bold; font-size: 14px; min-height: 20px; margin-bottom: 15px; }
        
        .keyboard { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .keyboard-row { display: flex; justify-content: center; gap: 6px; }
        .key { background-color: #d3d6da; color: black; border: none; border-radius: 6px; padding: 15px 0; font-size: 20px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; max-width: 45px; transition: background-color 0.2s, color 0.2s; }
        .key.action { flex: 1.5; font-size: 14px; max-width: 65px; background-color: #6c757d; color: white; }
        .key:disabled { opacity: 0.5; cursor: not-allowed; }

        .key-66 { background-color: #28a745 !important; color: white !important; } 
        .key-65 { background-color: #ffc107 !important; color: black !important; } 
        .key-0 { background-color: #555 !important; color: white !important; } 

        .guesses-container { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .guess-row { display: flex; justify-content: center; gap: 5px; }
        .guess-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; border-radius: 4px; }
        
        .color-66 { background-color: #28a745; } 
        .color-65 { background-color: #ffc107; color: black; } 
        .color-0 { background-color: #333; border: 1px solid #555; } 

        @media (prefers-color-scheme: dark) {
            body { background: #121212; color: #e0e0e0; }
            .card { background: #1e1e1e; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
            h1, h2, h3, .app-title { color: #f4f4f9; }
            .subtitle, .app-desc, label, .helper-text { color: #aaa !important; }
            input[type="text"], input[type="password"], input[type="number"], select { background-color: #2c2c2c; color: #fff; border: 1px solid #444; }
            select:disabled, input:disabled { background-color: #222; color: #666; }
            .iteration-box, .keyboard-section, .player-list, .settings-box { background: #2a2a2a; border-color: #444; }
            .player-row, .player-list li { border-bottom: 1px solid #444; }
            .key { background-color: #444; color: #f4f4f9; }
            .key:disabled { opacity: 0.4; }
            .key-0 { background-color: #222 !important; color: #777 !important; border: 1px solid #444; }
            .turn-waiting { background-color: #3a2e00; color: #ffdb4d; border-color: #665700; }
            .turn-active { background-color: #003311; color: #4dff88; border-color: #006622; }
            hr { background: #444 !important; }
            .color-0 { background-color: #000; border: 1px solid #333; } 
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-bar">
            <a href="/" class="home-btn">🏠 Home</a>
            <h1>Vesta-Word</h1>
            <div id="my-wins-display" style="display: none; font-weight: bold; color: #28a745; margin-right: 15px;">🏆 0</div>
            <button id="global-pause-btn" class="pause-btn" onclick="togglePause()" disabled title="Loading...">⏸️</button>
        </div>

        <div id="lobby-screen" style="display: block;">
            
            <div id="setup-inputs">
                <div class="settings-box">
                    <label>Max Guesses</label>
                    <input type="number" id="setting-guesses" value="6" min="1" max="10">
                    
                    <label>Turn Timer</label>
                    <select id="setting-timer-enabled" onchange="document.getElementById('timer-sec-container').style.display = this.value === 'true' ? 'block' : 'none'">
                        <option value="false">Off</option>
                        <option value="true" selected>On</option>
                    </select>
                    
                    <div id="timer-sec-container" style="display: block;">
                        <label>Seconds per turn</label>
                        <input type="number" id="setting-timer-sec" value="60" min="5" max="120">
                    </div>
                    <p id="settings-msg" style="color: #007bff; font-size: 12px; margin-top: 10px; font-weight: bold;"></p>
                </div>

                <h3>Join Game</h3>
                <input type="text" id="player-name" placeholder="Enter your name" maxlength="10">
                <button class="btn-primary" id="join-btn" onclick="joinGame()">Join Lobby</button>
                <p id="error-msg" style="color: red; margin-top: 10px;"></p>
            </div>
            
            <div id="lobby-waiting" style="display: none; margin-top: 25px;">
                <h3 style="color: #666;">Players in Lobby</h3>
                <ul class="player-list" id="player-list-ul"></ul>
                <button class="btn-success" onclick="startGame()">Start Game</button>
            </div>
        </div>

        <div id="game-screen">
            <div id="turn-banner" class="turn-banner turn-waiting">Waiting for game to start...</div>
            
            <div id="turn-timer-display" class="timer-display" style="display: none;">60</div>
            
            <div class="guesses-container" id="past-guesses"></div>
            
            <div class="word-input-display" id="current-input"></div>
            <div id="guess-error" class="error-message"></div>
            
            <div class="keyboard" id="keyboard"></div>
            
            <button id="submit-guess-btn" class="btn-submit" onclick="submitGuess()" disabled>SUBMIT GUESS</button>
            <button id="btn-replay" class="btn-success" onclick="startGame()" style="display: none; margin-top: 20px; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">🔄 PLAY AGAIN</button>
            
            <div class="bottom-actions">
                <button class="btn-leave" onclick="window.location.href='/'">Leave Game</button>
                <button class="btn-end" onclick="endGame()">End Game</button>
            </div>
        </div>
    </div>

    <script>
        let myPlayerId = null;
        let myName = "";
        let currentInput = "";
        let activeBoardUuid = '';
        let isAutomationPaused = false;
        
        let currentTurnId = -1;
        let turnTimerInterval;
        let secondsRemaining = 60;
        
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/config').then(res => res.json()).then(data => {
                activeBoardUuid = data.fiestaboard_uuid || '';
                if(activeBoardUuid) {
                    fetch('http://fiestapi.local:4420/api/settings/board')
                        .then(res => res.json())
                        .then(apiData => {
                            const b = (apiData.boards || apiData.settings.boards || []).find(x => x.id === activeBoardUuid);
                            if(b) updatePauseButtonUI(b.paused);
                        });
                }
            });
            buildKeyboard();
            setInterval(pollGameState, 1000); 
        });

        function togglePause() {
            if(!activeBoardUuid) return;
            const btn = document.getElementById('global-pause-btn'); btn.disabled = true;
            fetch(`http://fiestapi.local:4420/api/settings/board/${activeBoardUuid}/pause`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paused: !isAutomationPaused })
            }).then(res => res.json()).then(data => {
                if(data.status === 'success' || data.paused !== undefined) updatePauseButtonUI(data.paused);
            }).catch(() => btn.disabled = false);
        }

        function updatePauseButtonUI(paused) {
            isAutomationPaused = paused;
            const btn = document.getElementById('global-pause-btn'); btn.disabled = false;
            btn.innerText = paused ? '▶️' : '⏸️';
            btn.style.backgroundColor = paused ? '#dc3545' : '#28a745';
        }

        function joinGame() {
            myName = document.getElementById('player-name').value.trim() || "Player";
            document.getElementById('join-btn').disabled = true;
            
            const payload = { 
                name: myName,
                max_guesses: document.getElementById('setting-guesses').value,
                timer_enabled: document.getElementById('setting-timer-enabled').value === 'true',
                timer_seconds: document.getElementById('setting-timer-sec').value
            };
            
            fetch('/api/vestaword/join', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    myPlayerId = data.player_id;
                    document.getElementById('setup-inputs').style.display = 'none';
                    document.getElementById('lobby-waiting').style.display = 'block';
                } else {
                    document.getElementById('error-msg').innerText = data.message;
                    document.getElementById('join-btn').disabled = false;
                }
            });
        }

        function startGame() {
            fetch('/api/vestaword/start', { method: 'POST' });
        }

        function endGame() {
            if(confirm("Are you sure you want to end this game for everyone?")) {
                fetch('/api/vestaword/end', { method: 'POST' });
            }
        }

        function forceTimeout() {
            fetch('/api/vestaword/timeout', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player_id: myPlayerId })
            });
        }

        function pollGameState() {
            fetch('/api/vestaword/state')
                .then(res => res.json())
                .then(state => {
                    if(state.status === 'lobby') {
                        document.getElementById('game-screen').style.display = 'none';
                        document.getElementById('lobby-screen').style.display = 'block';
                        document.getElementById('my-wins-display').style.display = 'none';
                        
                        if(state.players.length > 0) {
                            document.getElementById('setting-guesses').disabled = true;
                            document.getElementById('setting-timer-enabled').disabled = true;
                            document.getElementById('setting-timer-sec').disabled = true;
                            
                            document.getElementById('setting-guesses').value = state.max_guesses;
                            document.getElementById('setting-timer-enabled').value = state.timer_enabled ? 'true' : 'false';
                            document.getElementById('setting-timer-sec').value = state.timer_seconds;
                            document.getElementById('timer-sec-container').style.display = state.timer_enabled ? 'block' : 'none';
                            document.getElementById('settings-msg').innerText = "Settings locked by lobby host.";
                        } else {
                            document.getElementById('setting-guesses').disabled = false;
                            document.getElementById('setting-timer-enabled').disabled = false;
                            document.getElementById('setting-timer-sec').disabled = false;
                            document.getElementById('settings-msg').innerText = "";
                        }
                        
                        if (myPlayerId && !state.players.find(p => p.id === myPlayerId)) {
                            myPlayerId = null;
                            document.getElementById('setup-inputs').style.display = 'block';
                            document.getElementById('join-btn').disabled = false;
                            document.getElementById('lobby-waiting').style.display = 'none';
                            clearInterval(turnTimerInterval);
                        }
                        
                        const ul = document.getElementById('player-list-ul');
                        ul.innerHTML = '';
                        state.players.forEach(p => {
                            const isMe = p.id === myPlayerId ? "(You)" : "";
                            ul.innerHTML += `<li><span>${p.name} ${isMe}</span> <span class="win-badge">🏆 ${p.wins}</span></li>`;
                        });
                    }
                    else if(state.status === 'playing' || state.status === 'game_over') {
                        document.getElementById('lobby-screen').style.display = 'none';
                        document.getElementById('game-screen').style.display = 'block';
                        
                        const me = state.players.find(p => p.id === myPlayerId);
                        if (me) {
                            document.getElementById('my-wins-display').style.display = 'block';
                            document.getElementById('my-wins-display').innerText = `🏆 ${me.wins}`;
                        }
                        
                        renderGameState(state);
                    }
                });
        }

        function renderGameState(state) {
            const banner = document.getElementById('turn-banner');
            const keys = document.querySelectorAll('.key');
            const submitBtn = document.getElementById('submit-guess-btn');
            const replayBtn = document.getElementById('btn-replay');
            const timerDisplay = document.getElementById('turn-timer-display');
            
            if (state.turn_id !== currentTurnId) {
                currentTurnId = state.turn_id;
                clearInterval(turnTimerInterval);
                document.getElementById('guess-error').innerText = ""; 
                
                // Now runs for EVERYONE connected to the lobby
                if (state.timer_enabled && state.status === 'playing') {
                    timerDisplay.style.display = 'block';
                    secondsRemaining = state.timer_seconds;
                    timerDisplay.innerText = secondsRemaining;
                    
                    turnTimerInterval = setInterval(() => {
                        secondsRemaining--;
                        timerDisplay.innerText = secondsRemaining;
                        if (secondsRemaining <= 0) {
                            clearInterval(turnTimerInterval);
                            // Only the active player sends the timeout API call to prevent spam
                            if (state.players[state.current_turn].id === myPlayerId) {
                                forceTimeout();
                            }
                        }
                    }, 1000);
                } else {
                    timerDisplay.style.display = 'none';
                }
            }
            
            if(state.status === 'game_over') {
                banner.className = 'turn-banner turn-active';
                banner.innerText = state.winner === 'Nobody' ? "Game Over! You lost." : `${state.winner} Wins!`;
                keys.forEach(k => k.disabled = true);
                submitBtn.style.display = 'none';
                replayBtn.style.display = 'block';
                timerDisplay.style.display = 'none';
                clearInterval(turnTimerInterval);
            } else {
                submitBtn.style.display = 'block';
                replayBtn.style.display = 'none';
                
                const currentPlayer = state.players[state.current_turn];
                const isMyTurn = (currentPlayer.id === myPlayerId);
                
                if (isMyTurn) {
                    banner.className = 'turn-banner turn-active';
                    banner.innerText = "IT'S YOUR TURN!";
                    keys.forEach(k => k.disabled = false);
                    submitBtn.disabled = false;
                } else {
                    banner.className = 'turn-banner turn-waiting';
                    banner.innerText = `Waiting for ${currentPlayer.name}...`;
                    keys.forEach(k => k.disabled = true);
                    submitBtn.disabled = true;
                    currentInput = ""; 
                    document.getElementById('current-input').innerText = "";
                }
            }

            const guessesDiv = document.getElementById('past-guesses');
            guessesDiv.innerHTML = '';
            state.guesses.forEach(g => {
                let html = '<div class="guess-row">';
                for(let i=0; i<5; i++) {
                    html += `<div class="guess-box color-${g.colors[i]}">${g.word[i]}</div>`;
                }
                html += '</div>';
                guessesDiv.innerHTML += html;
            });

            const letterColors = {};
            state.guesses.forEach(g => {
                for(let i=0; i<5; i++) {
                    const letter = g.word[i];
                    const color = g.colors[i];
                    
                    if (letterColors[letter] === undefined) {
                        letterColors[letter] = color;
                    } else {
                        if (color === 66) letterColors[letter] = 66; 
                        else if (color === 65 && letterColors[letter] !== 66) letterColors[letter] = 65; 
                    }
                }
            });

            keys.forEach(k => {
                k.classList.remove('key-66', 'key-65', 'key-0');
                const letter = k.innerText;
                if (letter.length === 1 && letterColors[letter] !== undefined) {
                    k.classList.add(`key-${letterColors[letter]}`);
                }
            });
        }

        function typeLetter(letter) {
            document.getElementById('guess-error').innerText = ""; 
            if(currentInput.length < 5) {
                currentInput += letter;
                document.getElementById('current-input').innerText = currentInput;
            }
        }

        function deleteLetter() {
            document.getElementById('guess-error').innerText = ""; 
            currentInput = currentInput.slice(0, -1);
            document.getElementById('current-input').innerText = currentInput;
        }

        function submitGuess() {
            if(currentInput.length !== 5) {
                document.getElementById('guess-error').innerText = "Guess must be 5 letters!";
                return;
            }
            
            document.getElementById('submit-guess-btn').disabled = true;
            document.getElementById('guess-error').innerText = "";
            
            fetch('/api/vestaword/guess', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player_id: myPlayerId, guess: currentInput })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    currentInput = "";
                    document.getElementById('current-input').innerText = "";
                } else {
                    document.getElementById('guess-error').innerText = data.message;
                    currentInput = ""; 
                    document.getElementById('current-input').innerText = "";
                    document.getElementById('submit-guess-btn').disabled = false;
                }
            });
        }

        function buildKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            const row1 = ['Q','W','E','R','T','Y','U','I','O','P'];
            const row2 = ['A','S','D','F','G','H','J','K','L'];
            const row3 = ['Z','X','C','V','B','N','M'];
            
            let html = '<div class="keyboard-row">';
            row1.forEach(l => html += `<button class="key" onclick="typeLetter('${l}')">${l}</button>`);
            html += '</div><div class="keyboard-row">';
            row2.forEach(l => html += `<button class="key" onclick="typeLetter('${l}')">${l}</button>`);
            html += '</div><div class="keyboard-row">';
            row3.forEach(l => html += `<button class="key" onclick="typeLetter('${l}')">${l}</button>`);
            html += `<button class="key action" onclick="deleteLetter()">DEL</button>`;
            html += '</div>';
            
            kb.innerHTML = html;
        }
    </script>
</body>
</html>
