<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Setup</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .home-btn { width: auto; padding: 8px 15px; font-size: 14px; background: #6c757d; margin: 0; text-decoration: none; color: white; border-radius: 6px; display: inline-block; font-weight: bold; }
        h1 { margin: 0; flex-grow: 1; text-align: center; padding-right: 80px; font-size: 24px; }
        
        .timer-setup-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 0; }
        
        .timer-controls { display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        
        input[type="number"].timer-input { font-size: 48px; font-weight: bold; width: 120px; height: 80px; text-align: center; border: 2px solid #ccc; background: #fff; margin: 0 15px; padding: 10px; border-radius: 12px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); -moz-appearance: textfield; }
        input[type="number"].timer-input:focus { outline: none; border-color: #007bff; box-shadow: 0 0 8px rgba(0,123,255,0.5); }
        input[type="number"].timer-input::-webkit-outer-spin-button, input[type="number"].timer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .control-btn { width: 60px; height: 60px; font-size: 32px; background: #007bff; color: #fff; border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.2); transition: transform 0.1s, box-shadow 0.1s; }
        .control-btn:hover { background: #0056b3; }
        .control-btn:active { transform: translateY(3px); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        
        .label { font-size: 18px; color: #666; font-weight: bold; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }

        .btn-start { background-color: #28a745; border: none; color: white; padding: 18px 32px; text-align: center; text-decoration: none; display: block; font-size: 20px; margin: 30px auto 10px auto; cursor: pointer; border-radius: 8px; font-weight: bold; transition: opacity 0.2s; width: 100%; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.15); }
        .btn-start:hover { opacity: 0.9; background-color: #218838; }
        
        #status-text { text-align: center; font-size: 14px; font-weight: bold; color: #555; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-bar">
            <a href="/" class="home-btn">🏠 Home</a>
            <h1>Fiesta Timer</h1>
        </div>

        <div class="timer-setup-container">
            <div class="label">Duration (Minutes)</div>
            
            <div class="timer-controls">
                <button class="control-btn" onclick="adjustTimer(-1)">-</button>
                <input type="number" id="timer-val" class="timer-input" value="5" min="1" onchange="validateTimer()">
                <button class="control-btn" onclick="adjustTimer(1)">+</button>
            </div>
            
            <button class="btn-start" onclick="startTimer()">Start Countdown</button>
            <p id="status-text"></p>
        </div>
    </div>

    <script>
        function adjustTimer(change) {
            const input = document.getElementById('timer-val');
            let val = parseInt(input.value) || 0;
            val += change;
            if (val < 1) val = 1;
            input.value = val;
        }

        function validateTimer() {
            const input = document.getElementById('timer-val');
            let val = parseInt(input.value);
            if (isNaN(val) || val < 1) {
                input.value = 1;
            }
        }

        function startTimer() {
            const minutes = parseInt(document.getElementById('timer-val').value) || 5;
            const status = document.getElementById('status-text');
            
            status.innerText = "Starting Timer sequence...";
            status.style.color = "#555";
            
            fetch('/api/timer/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ minutes: minutes })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    status.innerText = "Timer running on Vestaboard!";
                    status.style.color = "green";
                } else if (data.status === 'warning') {
                    status.innerText = data.message;
                    status.style.color = "orange";
                } else {
                    status.innerText = "Error: " + data.message;
                    status.style.color = "red";
                }
                setTimeout(() => { if (status.innerText.includes("Timer running")) status.innerText = ""; }, 4000);
            })
            .catch(error => {
                status.innerText = "Network Error contacting hub.";
                status.style.color = "red";
            });
        }
    </script>
</body>
</html>
